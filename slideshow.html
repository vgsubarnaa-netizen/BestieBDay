<!DOCTYPE html>
<html>
<head>
    <title>Our Memories ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<audio autoplay loop>
    <source src="music/birthday.mp3" type="audio/mpeg">
</audio>
<body>

<h1>📸 Our Beautiful Memories 📸</h1>

<div class="slideshow">
    <img id="slide" src="images/photo1.jpg" width="400" alt="Memory Photo">
</div>

<p>
Every picture tells a beautiful story...
Thank you for making my life full of unforgettable memories. ❤️
</p>

<a href="letter.html">
    <button>Next ➜ Read My Letter 💌</button>
</a>
<div class="cursor"></div>
<script>
const images = [
    "images/photo1.jpg",
    "images/photo2.jpg",
    "images/photo3.jpg",
    "images/photo4.jpg",
    "images/photo5.jpg",
    "images/photo6.jpg",
    "images/photo7.jpg",
    "images/photo8.jpg",
    "images/photo9.jpg",
    "images/photo10.jpg",
    "images/photo11.jpg",
    "images/photo12.jpg",
    "images/photo13.jpg",
    "images/photo14.jpg",
    "images/photo15.jpg",
    "images/photo16.jpg"
];

let i = 0;
const slide = document.getElementById("slide");

setInterval(() => {
    i = (i + 1) % images.length;
    slide.src = images[i];
}, 3000);

const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.pageX + "px";
    cursor.style.top = e.pageY + "px";
});
</script>

</body>
</html>
